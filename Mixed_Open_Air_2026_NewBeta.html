<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mixed Open Air 2026</title>
  <style>
    /* ===== Basis ===== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      color: #1f2937;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    h2 {
      margin-top: 0;
    }

    h3 {
      margin-top: 24px;
      margin-bottom: 12px;
    }

    /* ===== Karten ===== */

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    /* ===== Eingabezeilen ===== */

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 200px;
    }

    input[type="number"] {
      width: 80px;
    }

    input[type="time"] {
      width: 120px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    /* ===== Einstellungen ===== */

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .setting {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting label {
      font-size: 14px;
      font-weight: 500;
      color: #475569;
    }

    .setting input {
      padding: 10px 12px;
    }

    /* ===== Teilnehmerliste ===== */

    .participant-list {
      padding-left: 20px;
      margin: 12px 0;
    }

    .participant-list li {
      padding: 4px 0;
    }

    /* ===== Runden ===== */

    .rounds-container {
      margin-top: 16px;
    }

    .round {
      margin-bottom: 24px;
    }

    .round h4 {
      margin: 16px 0 12px;
      color: #1e293b;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .round-time {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 14px;
    }

    /* ===== Spiele ===== */

    .match-sets {
      display: grid;
      grid-template-columns: 1fr 140px 140px 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 14px;
      margin-bottom: 10px;
      background: #f8fafc;
      border-radius: 10px;
    }

    .team-name {
      font-weight: bold;
      text-align: center;
    }

    .set-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .set-block label {
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }

    .score-row {
      

width: 100%;
  text-align: center;
  padding: 8px;


    }

    .score-row input {
      
  width: 100%;
  min-width: 60px;
  text-align: center;
  padding: 8px;
  font-size: 18px;


 /* Pfeile entfernen */
  appearance: textfield;
  -moz-appearance: textfield;


    }


/* Chrome, Edge, Safari */
.score-row input::-webkit-outer-spin-button,
.score-row input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}


    .score-row span {
      text-align: center;
    }

    .referee-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ===== Tabellen ===== */

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th,
    td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #f1f5f9;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
    }

    td:nth-child(2),
    th:nth-child(2) {
      text-align: left;
    }

    td strong {
      color: #2563eb;
    }

    .referee-table {
      max-width: 300px;
      min-width: auto;
    }

    /* ===== Hinweise ===== */

    .hint {
      color: #64748b;
      font-style: italic;
    }

    /* ===== Druckknöpfe ===== */

    .print-all-row {
      margin-bottom: 16px;
    }

    .print-all-button {
      background: #059669;
      padding: 10px 16px;
    }

    .print-all-button:hover {
      background: #047857;
    }

    .print-match-button {
      background: #6b7280;
      padding: 8px 12px;
      font-size: 14px;
    }

    .print-match-button:hover {
      background: #4b5563;
    }

    /* ===== Druckbereich (versteckt auf Bildschirm) ===== */

    .print-area {
      display: none;
    }




@media print {

  body * {
    visibility: hidden !important;
  }

  #printArea,
  #printArea * {
    visibility: visible !important;
  }

  #printArea {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

}

.sheet-set {

    .points-grid {

.points-team-title {

}

<body>
  <main class="app">
    <h1>Mixed Open Air 2026</h1>

    <section class="card">
      <h2>Turnier-Einstellungen</h2>

      <div class="settings-grid">
        <div class="setting">
          <label for="groupCountInput">Anzahl Felder</label>
          <input
            type="number"
            id="groupCountInput"
            min="1"
            max="10"
            value="1"
          />
        </div>

        <div class="setting">
          <label for="startTimeInput">Startzeit</label>
          <input
            type="time"
            id="startTimeInput"
            value="09:00"
          />
        </div>

        <div class="setting">
          <label for="setDurationInput">Satzzeit (Minuten)</label>
          <input
            type="number"
            id="setDurationInput"
            min="1"
            max="60"
            value="8"
          />
        </div>

        <div class="setting">
          <label for="breakDurationInput">Pause zwischen Runden (Minuten)</label>
          <input
            type="number"
            id="breakDurationInput"
            min="0"
            max="60"
            value="2"
          />
        </div>
      </div>

      
<button id="createGroupsButton">Felder erstellen</button>

<button id="saveButton">💾 Turnier speichern</button>
<button id="loadButton">📂 Turnier laden</button>

<input
  type="file"
  id="loadFileInput"
  accept=".json"
  style="display:none"
/>

    </section>

    <section id="groupsContainer"></section>
  </main>

  <div id="printArea" class="print-area"></div>

  <script>
    // ===== Elemente =====

    const groupCountInput = document.getElementById("groupCountInput");
    const startTimeInput = document.getElementById("startTimeInput");
    const setDurationInput = document.getElementById("setDurationInput");
    const breakDurationInput = document.getElementById("breakDurationInput");
    const createGroupsButton = document.getElementById("createGroupsButton");
    const groupsContainer = document.getElementById("groupsContainer");
    const printArea = document.getElementById("printArea");

const saveButton =
  document.getElementById("saveButton");

const loadButton =
  document.getElementById("loadButton");

const loadFileInput =
  document.getElementById("loadFileInput");


    // ===== Daten =====

    let groups = [];
    let settings = {
      startTime: "09:00",
      setDuration: 8,
      breakDuration: 2
    };

    // ===== Event Listener =====

    createGroupsButton.addEventListener("click", createGroups);


startTimeInput.addEventListener(
  "change",
  updateScheduleTimes
);

setDurationInput.addEventListener(
  "change",
  updateScheduleTimes
);


breakDurationInput.addEventListener(
  "change",
  updateScheduleTimes
);




saveButton.addEventListener(
  "click",
  saveTournament
);

loadButton.addEventListener(
  "click",
  function () {
    loadFileInput.click();
  }
);


loadFileInput.addEventListener(
  "change",
  loadTournament
);



    // ===== Gruppen erstellen =====

    function createGroups() {
      const groupCount = Number(groupCountInput.value);

      if (groupCount < 1 || groupCount > 10) {
        alert("Bitte wähle zwischen 1 und 10 Feldern.");
        return;
      }

      settings.startTime = startTimeInput.value || "09:00";
      settings.setDuration = Number(setDurationInput.value) || 8;
      settings.breakDuration = Number(breakDurationInput.value) || 0;

      groups = [];

      for (let i = 0; i < groupCount; i++) {
        groups.push({
          name: "Feld " + (i + 1),
          participants: [],
          matches: [],
          rounds: []
        });
      }

      renderGroups();
    }

    // ===== Zeitberechnung =====

    function getMatchDuration() {
      return settings.setDuration * 2;
    }

    function getRoundDuration() {
      return getMatchDuration() + settings.breakDuration;
    }

    function calculateRoundStartTime(roundIndex) {
      const timeParts = settings.startTime.split(":");
      let hours = Number(timeParts[0]);
      let minutes = Number(timeParts[1]);

      const totalMinutesOffset = roundIndex * getRoundDuration();

      minutes += totalMinutesOffset;
      hours += Math.floor(minutes / 60);
      minutes = minutes % 60;
      hours = hours % 24;

      const hoursStr = String(hours).padStart(2, "0");
      const minutesStr = String(minutes).padStart(2, "0");

      return hoursStr + ":" + minutesStr;
    }

    // ===== Gruppen rendern =====

    function renderGroups() {
      groupsContainer.innerHTML = "";

      groups.forEach(function (group, groupIndex) {
        const groupSection = document.createElement("section");
        groupSection.className = "card group-card";

        groupSection.innerHTML =
          "<h2>" + group.name + "</h2>" +
          '<div class="input-row">' +
            '<input type="text" placeholder="Mannschaft für ' + group.name + ' eingeben" ' +
              'data-group-index="' + groupIndex + '" class="participant-input" />' +
            '<button data-group-index="' + groupIndex + '" class="add-participant-button">' +
              "Hinzufügen" +
            "</button>" +
          "</div>" +
          '<ul class="participant-list">' +
            group.participants.map(function (participant, index) {
              return "<li>"+(index+1)+". "+participant+' <button class="delete-participant-button" data-group-index="'+groupIndex+'" data-participant-index="'+index+'">🗑️</button></li>';
            }).join("") +
          "</ul>" +
          '<button data-group-index="' + groupIndex + '" class="create-matches-button">' +
            "Spielplan für " + group.name + " erstellen" +
          "</button>" +
          '<div class="rounds-container">' +
            renderRoundsHtml(group, groupIndex) +
          "</div>" +
          "<h3>Tabelle " + group.name + "</h3>" +
          '<div class="table-wrapper">' +
            "<table>" +
              "<thead>" +
                "<tr>" +
                  "<th>Platz</th>" +
                  "<th>Mannschaft</th>" +
                  "<th>Spiele</th>" +
                  "<th>S</th>" +
                  "<th>U</th>" +
                  "<th>N</th>" +
                  "<th>Spielpunkte</th>" +
                  "<th>Sätze +</th>" +
                  "<th>Sätze −</th>" +
                  "<th>Satz-Diff.</th>" +
                  "<th>Pkt. Satz 1</th>" +
                  "<th>Pkt. Satz 2</th>" +
                  "<th>Pkt. gesamt</th>" +
"<th>Punkte-Bilanz</th>" +
                "</tr>" +
              "</thead>" +
              "<tbody>" +
                renderTableHtml(group) +
              "</tbody>" +
           
"</table>" +
"</div>" +



"<h3>Schiedsrichter-Einsätze</h3>" +

          '<table class="referee-table">' +
            "<thead>" +
              "<tr>" +
                "<th>Mannschaft</th>" +
                "<th>Einsätze</th>" +
              "</tr>" +
            "</thead>" +
            "<tbody>" +
              renderRefereeStatsHtml(group) +
            "</tbody>" +
          "</table>";

        groupsContainer.appendChild(groupSection);
      });

      addDynamicEventListeners();
    }


//updateTable

function updateTable(groupIndex){

  const groupCards =
    document.querySelectorAll(".group-card");

  const card =
    groupCards[groupIndex];

  if(!card){
    return;
  }

  const tbody =
    card.querySelector(
      ".table-wrapper tbody"
    );

  tbody.innerHTML =
    renderTableHtml(
      groups[groupIndex]
    );

}



// Schedueltimeupdaten


function updateScheduleTimes() {

  settings.startTime =
    startTimeInput.value || "09:00";

  settings.setDuration =
    Number(setDurationInput.value) || 8;

  settings.breakDuration =
    Number(breakDurationInput.value) || 0;

  groups.forEach(function(group) {

    group.rounds.forEach(function(round, index) {

      round.startTime =
        calculateRoundStartTime(index);

    });

  });

  renderGroups();

}
   



 // ===== Dynamische Event Listener =====


function addDynamicEventListeners() {

  const addButtons =
    document.querySelectorAll(".add-participant-button");

  addButtons.forEach(function (button) {
    button.addEventListener("click", function () {
      const groupIndex =
        Number(button.dataset.groupIndex);

      addParticipant(groupIndex);
    });
  });

  const participantInputs =
    document.querySelectorAll(".participant-input");

  participantInputs.forEach(function (input) {
    input.addEventListener("keydown", function (event) {

      if (event.key === "Enter") {

        const groupIndex =
          Number(input.dataset.groupIndex);

        addParticipant(groupIndex);
      }

    });
  });

  const deleteButtons =
    document.querySelectorAll(".delete-participant-button");

  deleteButtons.forEach(function(button){

    button.addEventListener("click", function(){

      const g =
        Number(button.dataset.groupIndex);

      const i =
        Number(button.dataset.participantIndex);

      groups[g].participants.splice(i,1);

      groups[g].matches = [];
      groups[g].rounds = [];

      renderGroups();

    });

  });

  const createMatchesButtons =
    document.querySelectorAll(".create-matches-button");

  createMatchesButtons.forEach(function (button) {

    button.addEventListener("click", function () {

      const groupIndex =
        Number(button.dataset.groupIndex);

      createMatches(groupIndex);

    });

  });



const scoreInputs =
  document.querySelectorAll(".score-input");

scoreInputs.forEach(function(input){

  input.addEventListener("input", function(){

    const groupIndex =
      Number(input.dataset.groupIndex);

    const matchIndex =
      Number(input.dataset.matchIndex);

    const field =
      input.dataset.field;

    groups[groupIndex]
      .matches[matchIndex][field] =
      input.value;

    updateTable(groupIndex);

  });

});





  const printMatchButtons =
    document.querySelectorAll(".print-match-button");

  printMatchButtons.forEach(function (button) {

    button.addEventListener("click", function () {

      const groupIndex =
        Number(button.dataset.groupIndex);

      const matchIndex =
        Number(button.dataset.matchIndex);

      printMatchSheet(
        groupIndex,
        matchIndex
      );

    });

  });

  const printAllButtons =
    document.querySelectorAll(".print-all-button");

  printAllButtons.forEach(function (button) {

    button.addEventListener("click", function () {

      const groupIndex =
        Number(button.dataset.groupIndex);

      printAllMatchSheets(
        groupIndex
      );

    });

  });

}




    // ===== Teilnehmer hinzufügen =====

    function addParticipant(groupIndex) {
      const input = document.querySelector(
        '.participant-input[data-group-index="' + groupIndex + '"]'
      );

      const name = input.value.trim();
      const group = groups[groupIndex];

      if (name === "") {
        alert("Bitte gib eine Mannschaft ein.");
        return;
      }

      if (group.participants.includes(name)) {
        alert("Diese Mannschaft wurde in diesem Feld bereits hinzugefügt.");
        return;
      }

      if (group.participants.length >= 8) {
        alert("Pro Feld sind maximal 8 Mannschaften erlaubt.");
        return;
      }

      group.participants.push(name);
      group.matches = [];
      group.rounds = [];

      renderGroups();
    }

    // ===== Spielplan erstellen =====


function generateRoundRobinMatches(
  participants
) {

  let teams = participants.slice();

  if (teams.length % 2 !== 0) {
    teams.push("BYE");
  }

  const matches = [];

  const rounds =
    teams.length - 1;

  for (let round = 0;
       round < rounds;
       round++) {

    for (
      let i = 0;
      i < teams.length / 2;
      i++
    ) {

      const home =
        teams[i];

      const away =
        teams[
          teams.length - 1 - i
        ];

      if (
        home !== "BYE" &&
        away !== "BYE"
      ) {

        matches.push({
          home: home,
          away: away,
          set1Home: "",
          set1Away: "",
          set2Home: "",
          set2Away: "",
          referee: null
        });

      }

    }

    const fixed = teams[0];

    const rotated =
      teams.slice(1);

    rotated.unshift(
      rotated.pop()
    );

    teams =
      [fixed].concat(rotated);

  }

  return matches;
}

function createRoundScheduleWithReferees(
  allMatches,
  participants
) {

  const rounds = [];
  const unscheduledMatches =
    allMatches.slice();

  let roundNumber = 1;

  while (unscheduledMatches.length > 0) {

    const match =
      unscheduledMatches.shift();

    rounds.push({
      number: roundNumber,
      startTime:
        calculateRoundStartTime(
          roundNumber - 1
        ),
      matches: [match]
    });

    roundNumber++;
  }

  // =========================
  // Backtracking Schiri-Zuteilung
  // =========================

  const totalMatches =
    allMatches.length;

  const targetPerTeam =
    totalMatches /
    participants.length;

  const refereeCount = {};
  const pairCount = {};

  participants.forEach(function(team) {

    refereeCount[team] = 0;

  });

  function getPairKey(
    referee,
    team
  ) {

    return referee + "|" + team;

  }

  function assignMatch(index) {

    if (index >= rounds.length) {
      return true;
    }

    const match =
      rounds[index].matches[0];

    let candidates =
      participants.filter(function(team) {

        return (
          team !== match.home &&
          team !== match.away
        );

      });

    candidates.sort(function(a, b) {

      const aPairs =
        (pairCount[
          getPairKey(a, match.home)
        ] || 0) +
        (pairCount[
          getPairKey(a, match.away)
        ] || 0);

      const bPairs =
        (pairCount[
          getPairKey(b, match.home)
        ] || 0) +
        (pairCount[
          getPairKey(b, match.away)
        ] || 0);

      if (aPairs !== bPairs) {
        return aPairs - bPairs;
      }

      return (
        refereeCount[a] -
        refereeCount[b]
      );

    });

    for (const referee of candidates) {

      if (
        refereeCount[referee] >=
        Math.ceil(targetPerTeam)
      ) {
        continue;
      }

      match.referee = referee;

      refereeCount[referee]++;

      pairCount[
        getPairKey(
          referee,
          match.home
        )
      ] =
        (pairCount[
          getPairKey(
            referee,
            match.home
          )
        ] || 0) + 1;

      pairCount[
        getPairKey(
          referee,
          match.away
        )
      ] =
        (pairCount[
          getPairKey(
            referee,
            match.away
          )
        ] || 0) + 1;

      if (
        assignMatch(index + 1)
      ) {
        return true;
      }

      refereeCount[referee]--;

      pairCount[
        getPairKey(
          referee,
          match.home
        )
      ]--;

      pairCount[
        getPairKey(
          referee,
          match.away
        )
      ]--;

      match.referee = null;
    }

    return false;
  }

  assignMatch(0);

  console.log(
    "Schiri-Verteilung",
    refereeCount
  );

  return rounds;
}

    function createEmptyStats(group) {
      const stats = {};

      group.participants.forEach(function (participant) {
        
stats[participant] = {
  name: participant,
  played: 0,
  wins: 0,
  draws: 0,
  losses: 0,
  gamePoints: 0,
  setsFor: 0,
  setsAgainst: 0,
  setDifference: 0,
  pointsSet1: 0,
  pointsSet2: 0,
  pointsTotal: 0,
  pointsAgainst: 0,
  pointDifference: 0
};

      });

      return stats;
    }

    function calculateTable(group) {
      const stats = createEmptyStats(group);

      group.matches.forEach(function (match) {
        const isComplete =
          match.set1Home !== "" &&
          match.set1Away !== "" &&
          match.set2Home !== "" &&
          match.set2Away !== "";

        if (!isComplete) {
          return;
        }

        const set1Home = Number(match.set1Home);
        const set1Away = Number(match.set1Away);
        const set2Home = Number(match.set2Home);
        const set2Away = Number(match.set2Away);

        const home = stats[match.home];
        const away = stats[match.away];

        // Satzpunkte addieren
        home.pointsSet1 += set1Home;
        home.pointsSet2 += set2Home;
        home.pointsTotal += set1Home + set2Home;

        away.pointsSet1 += set1Away;
        away.pointsSet2 += set2Away;
        away.pointsTotal += set1Away + set2Away;


home.pointsAgainst += set1Away + set2Away;
away.pointsAgainst += set1Home + set2Home;


        // Satzpunkte und Satzergebnisse
        let homeSetsWon = 0;
        let awaySetsWon = 0;
        const evalSet=(h,a)=>{
          if(h>a){homeSetsWon++; home.gamePoints+=2;}
          else if(h<a){awaySetsWon++; away.gamePoints+=2;}
          else {home.gamePoints+=1; away.gamePoints+=1;}
        };
        evalSet(set1Home,set1Away);
        evalSet(set2Home,set2Away);

        home.played++;
        away.played++;

        home.setsFor += homeSetsWon;
        home.setsAgainst += awaySetsWon;

        away.setsFor += awaySetsWon;
        away.setsAgainst += homeSetsWon;

        // Spielstatistik
        if (homeSetsWon > awaySetsWon){home.wins++; away.losses++;}
        else if(homeSetsWon<awaySetsWon){away.wins++; home.losses++;}
        else {home.draws++; away.draws++;}
      });

      const table = Object.keys(stats).map(function (key) {
        return stats[key];
      });

      
table.forEach(function (team) {
  team.setDifference =
    team.setsFor - team.setsAgainst;

  team.pointDifference =
    team.pointsTotal - team.pointsAgainst;
});


      // Sortierung
      table.sort(function (a, b) {
        if (b.gamePoints !== a.gamePoints) {
          return b.gamePoints - a.gamePoints;
        }

        if (b.setDifference !== a.setDifference) {
          return b.setDifference - a.setDifference;
        }

        if (b.setsFor !== a.setsFor) {
          return b.setsFor - a.setsFor;
        }

        
if (b.pointsTotal !== a.pointsTotal) {
  return b.pointsTotal - a.pointsTotal;
}

if (b.pointDifference !== a.pointDifference) {
  return b.pointDifference - a.pointDifference;
}

return a.name.localeCompare(b.name);

      });

      return table;
    }

      2

      }

      .slice(0,10);

        types: [{
          description: "JSON-Datei",
          accept: {

function loadTournament(event) {

  const file =
    event.target.files[0];

  if (!file) {
    return;
  }

  const reader =
    new FileReader();

  reader.onload =
    function (e) {

      try {

        const data =
          JSON.parse(
            e.target.result
          );

        settings =
          data.settings ||
          settings;

        groups =
          data.groups ||
          [];

        startTimeInput.value =
          settings.startTime ||
          "09:00";

        setDurationInput.value =
          settings.setDuration ||
          8;

        breakDurationInput.value =
          settings.breakDuration ||
          2;

        groupCountInput.value =
          groups.length || 1;

        renderGroups();

        alert(
          "Turnier erfolgreich geladen."
        );

      } catch (error) {

        console.error(error);

        alert(
          "Fehler beim Laden der Datei."
        );
      }

      loadFileInput.value = "";
    };

  reader.readAsText(file);
}
